name: Run Python Script
on: [push]
jobs:
  run-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          pip install yfinance pandas
      - name: Run Script
        run: python script.py
